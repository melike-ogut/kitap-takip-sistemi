<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kitaplar</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:lightblue;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    height:100vh;
    background:#0f172a;
    position:fixed;
    padding:20px;
    color:white;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#2563eb;
}

/* MAIN */
.main{
    margin-left:250px;
    padding:20px;
}

/* BOX */
.box{
    background:lightcyan;
    padding:20px;
    border-radius:40px;
    margin-bottom:50px;
    margin-left: 35px;
}

/* INPUT */
input{
    padding:10px;
    margin:5px;
}

/* BUTTON */
button{
    padding:8px 12px;
    cursor:pointer;
}

/* LIST */
li{
    margin:8px 0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📚 Kütüphane</h2>

    <a href="index.html">🏠 Ana Sayfa</a>
    <a class="active" href="kitaplar.html">📖 Kitaplar</a>
    <a href="uyeler.html">👤 Üyeler</a>
    <a href="odunc.html">🔄 Ödünç</a>
    <a href="hakkinda.html">ℹ️ Hakkında</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="box">
        <h3>📚 Kitap Ekle</h3>

        <input id="kitapAdi" placeholder="Kitap adı">
        <input id="yazar" placeholder="Yazar">
        <button onclick="kitapEkle()">Ekle</button>
    </div>

    <div class="box">
        <h3>📋 Kitap Listesi</h3>
        <ul id="liste"></ul>
    </div>

</div>

<script>
// 📌 KİTAP EKLE
function kitapEkle(){

    let kitaplar = JSON.parse(localStorage.getItem("kitaplar")) || [];

    let ad = document.getElementById("kitapAdi").value;
    let yazar = document.getElementById("yazar").value;

    if(ad === "" || yazar === ""){
        alert("Boş bırakma!");
        return;
    }

    kitaplar.push({ad, yazar});

    localStorage.setItem("kitaplar", JSON.stringify(kitaplar));

    listele();

    document.getElementById("kitapAdi").value = "";
    document.getElementById("yazar").value = "";
}

// 📌 SİL
function sil(index){

    let kitaplar = JSON.parse(localStorage.getItem("kitaplar")) || [];

    kitaplar.splice(index, 1);

    localStorage.setItem("kitaplar", JSON.stringify(kitaplar));

    listele();
}

// 📌 LİSTELE
function listele(){

    let kitaplar = JSON.parse(localStorage.getItem("kitaplar")) || [];

    let liste = document.getElementById("liste");

    liste.innerHTML = "";

    kitaplar.forEach((k, index)=>{
        liste.innerHTML += `
        <li>
            📖 ${k.ad} - ✍️ ${k.yazar}
            <button onclick="sil(${index})">Sil</button>
        </li>`;
    });
}

// ilk açılış
listele();
</script>

</body>
</html>
