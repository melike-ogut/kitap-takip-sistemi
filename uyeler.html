<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Üyeler</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:lightblue;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    height:100vh;
    background:#0f172a;
    position:fixed;
    padding:20px;
    color:white;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#2563eb;
}

/* MAIN */
.main{
    margin-left:250px;
    padding:20px;
}

/* BOX */
.box{
    background:lightcyan;
    padding:20px;
    border-radius:40px;
    margin-bottom:50px;
    margin-left: 35px;
}

/* INPUT */
input{
    padding:10px;
    margin:5px;
}

/* BUTTON */
button{
    padding:8px 12px;
    cursor:pointer;
}

/* LIST */
li{
    margin:8px 0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📚 Kütüphane</h2>

    <a href="index.html">🏠 Ana Sayfa</a>
    <a href="kitaplar.html">📖 Kitaplar</a>
    <a class="active" href="uyeler.html">👤 Üyeler</a>
    <a href="odunc.html">🔄 Ödünç</a>
    <a href="hakkinda.html">ℹ️ Hakkında</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="box">
        <h3>👤 Üye Ekle</h3>

        <input id="ad" placeholder="Ad Soyad">
        <input id="telefon" placeholder="Telefon">
        <button onclick="uyeEkle()">Ekle</button>
    </div>

    <div class="box">
        <h3>📋 Üye Listesi</h3>
        <ul id="liste"></ul>
    </div>

</div>

<script>

// 👤 ÜYE EKLE
function uyeEkle(){

    let uyeler = JSON.parse(localStorage.getItem("uyeler")) || [];

    let ad = document.getElementById("ad").value;
    let telefon = document.getElementById("telefon").value;

    if(ad === "" || telefon === ""){
        alert("Boş bırakma!");
        return;
    }

    uyeler.push({ad, telefon});

    localStorage.setItem("uyeler", JSON.stringify(uyeler));

    listele();

    document.getElementById("ad").value = "";
    document.getElementById("telefon").value = "";
}

// 🗑️ SİL
function sil(index){

    let uyeler = JSON.parse(localStorage.getItem("uyeler")) || [];

    uyeler.splice(index, 1);

    localStorage.setItem("uyeler", JSON.stringify(uyeler));

    listele();
}

// 📋 LİSTELE
function listele(){

    let uyeler = JSON.parse(localStorage.getItem("uyeler")) || [];

    let liste = document.getElementById("liste");

    liste.innerHTML = "";

    uyeler.forEach((u, index)=>{
        liste.innerHTML += `
        <li>
            👤 ${u.ad} - 📞 ${u.telefon}
            <button onclick="sil(${index})">Sil</button>
        </li>`;
    });
}

// ilk açılış
listele();

</script>

</body>
</html>
