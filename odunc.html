<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ödünç Alma</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:lightblue;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    height:100vh;
    background:#0f172a;
    position:fixed;
    padding:20px;
    color:white;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#2563eb;
}


.main{
    margin-left:250px;
    padding:20px;
    width:100%;
}

.form-alani{
    background:lightcyan;
    padding:15px;
    border-radius:10px;
    width:300px;
    margin-left:300px;

}

#liste{
    margin-top:15px;
    padding:0;
    list-style:none;
    margin-left: 110px;
}

#liste li{
    background:white;
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    cursor:pointer;
}

.sil{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:6px;
}

h3{
    margin-left: 100px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📚 Kütüphane</h2>

    <a href="index.html">🏠 Ana Sayfa</a>
    <a class="kitaplar.html" href="">📖 Kitaplar</a>
    <a href="uyeler.html">👤 Üyeler</a>
    <a href="active" href="odunc">🔄 Ödünç</a>
    <a href="hakkinda.html">ℹ️ Hakkında</a>
</div>

<div class="main">

    <div class="form-alani">
        <input id="kitap" placeholder="Kitap adı">
        <input id="uye" placeholder="Üye adı">
        <button onclick="oduncVer()">Ver</button>
    </div>

    <h3>🔄 ÖDÜNÇ KİTAPLAR</h3>


    <ul id="liste"></ul>

</div>

<script>
function oduncVer(){

    let oduncler = JSON.parse(localStorage.getItem("oduncler")) || [];

    let kitap = document.getElementById("kitap").value;
    let uye = document.getElementById("uye").value;

    if(kitap.trim().length < 2 || uye.trim().length < 2){
        alert("En az 2 karakter gir!");
        return;
    }

    oduncler.push({kitap, uye});

    localStorage.setItem("oduncler", JSON.stringify(oduncler));

    document.getElementById("kitap").value = "";
    document.getElementById("uye").value = "";

    listele();
}

function sil(index){

    let oduncler = JSON.parse(localStorage.getItem("oduncler")) || [];

    oduncler.splice(index, 1);

    localStorage.setItem("oduncler", JSON.stringify(oduncler));

    listele();
}

function listele(){

    let oduncler = JSON.parse(localStorage.getItem("oduncler")) || [];

    let liste = document.getElementById("liste");

    liste.innerHTML = "";

    oduncler.forEach((o, i)=>{
        liste.innerHTML += `
            <li>
                ${o.uye} → ${o.kitap}
                <button class="sil" onclick="sil(${i})">Sil</button>
            </li>
        `;
    });
}

listele();
</script>

</body>
</html>
